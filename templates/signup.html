
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MYOB Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Fallback gradient */
            background: linear-gradient(135deg, #121212 0%, #1c1c1c 100%);
            /* Background Image */
            background-image: url('/static/images/bg-project-banner.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10%;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Overlay to improve readability over image */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            /* 60% dark overlay */
            z-index: -2;
        }

        body::before {
            content: "";
            position: fixed;
            left: 20px;
            top: 20px;
            width: 220px;
            height: 220px;
            background-image: url('https://www.mmcconvert.com/assets/images/nlogosmall.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.95;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
            animation: logoFloat 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes logoFloat {
            0% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            }

            50% {
                transform: translateY(15px) scale(1.05);
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
            }

            100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            }
        }


        .auth-card {
            background: rgba(255, 255, 255, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            z-index: 1;
            max-height: 90vh;
            overflow-y: auto;
            animation: cardFadeInUp 0.8s ease-out;
        }

        @keyframes cardFadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #FF416C;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%);
            border: none;
            padding: 10px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }

        .developer-tag {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
            font-family: 'Segoe UI', sans-serif;
        }

        .developer-tag b {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #FF416C;
            display: inline-block;
            margin-left: 5px;
            text-shadow: 0 0 10px rgba(255, 65, 108, 0.4);
            animation: developerGlow 2s ease-in-out infinite alternate;
        }

        @keyframes developerGlow {
            0% {
                text-shadow: 0 0 5px rgba(255, 65, 108, 0.4), 0 0 10px rgba(255, 65, 108, 0.2);
                opacity: 0.8;
            }

            50% {
                text-shadow: 0 0 20px rgba(255, 65, 108, 0.9), 0 0 35px rgba(255, 65, 108, 0.6), 0 0 50px rgba(255, 65, 108, 0.4);
                opacity: 1;
            }

            100% {
                text-shadow: 0 0 5px rgba(255, 65, 108, 0.4), 0 0 10px rgba(255, 65, 108, 0.2);
                opacity: 0.8;
            }
        }

        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        .fade-out {
            opacity: 1 !important;
        }

        .fade-in {
            opacity: 0 !important;
        }
    </style>
</head>

<body>
    <div id="pageOverlay" class="page-transition-overlay"></div>
    <div class="auth-card">
        <div class="logo">MYOB Data Extractor</div>
        <h3 class="text-center mb-4">Create Account</h3>

        <form id="signupForm">
            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="full_name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="company_name" class="form-label">Company Name (Optional)</label>
                <input type="text" class="form-control" id="company_name">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <a href="/login" class="btn btn-outline-custom">Back to Login</a>
            </div>
        </form>

        <style>
            .btn-outline-custom {
                color: #FF416C;
                border-color: #FF416C;
                font-weight: 600;
                transition: all 0.3s ease;
            }

            .btn-outline-custom:hover {
                background: #FF416C;
                color: white;
            }
        </style>

        <div id="message" class="mt-3"></div>
        <div class="developer-tag">
            Developed by <b>AMAN GUPTA</b>
        </div>
    </div>

    <script>
        // Page Transition Logic
        window.addEventListener('load', () => {
            const overlay = document.getElementById('pageOverlay');
            overlay.classList.add('fade-in');
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', e => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:')) {
                    e.preventDefault();
                    document.getElementById('pageOverlay').classList.remove('fade-in');
                    document.getElementById('pageOverlay').classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = href;
                    }, 500);
                }
            });
        });

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const fullName = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const companyName = document.getElementById('company_name').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const messageDiv = document.getElementById('message');

            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="alert alert-danger">Passwords do not match</div>';
                return;
            }

            if (password.length < 6) {
                messageDiv.innerHTML = '<div class="alert alert-danger">Password must be at least 6 characters</div>';
                return;
            }

            messageDiv.innerHTML = '<div class="alert alert-info">Creating account...</div>';

            try {
                const response = await fetch('/myob/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        full_name: fullName,
                        email: email,
                        company_name: companyName,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">Account created successfully! Redirecting...</div>';

                    // Transition to dashboard
                    document.getElementById('pageOverlay').classList.remove('fade-in');
                    document.getElementById('pageOverlay').classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    messageDiv.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-danger">Network error</div>';
            }
        });
    </script>
</body>

</html>
