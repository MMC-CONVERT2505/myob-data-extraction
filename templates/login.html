
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MYOB Extractor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Fallback gradient */
            background: linear-gradient(135deg, #121212 0%, #1c1c1c 100%);
            /* Background Image */
            background-image: url('/myob/static/images/bg-project-banner.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10%;
            overflow: hidden;
            position: relative;
        }

        /* Overlay to improve readability over image */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            /* 60% dark overlay */
            z-index: -2;
        }

        body::before {
            content: "";
            position: fixed;
            left: 20px;
            top: 20px;
            width: 220px;
            height: 220px;
            background-image: url('https://www.mmcconvert.com/assets/images/nlogosmall.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.95;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
            animation: logoFloat 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes logoFloat {
            0% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            }

            50% {
                transform: translateY(15px) scale(1.05);
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
            }

            100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            }
        }

        .auth-card {
            background: rgba(255, 255, 255, 1);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1;
            animation: cardFadeInUp 0.8s ease-out;
        }

        @keyframes cardFadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-myob {
            background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease;
        }

        .btn-myob:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
            color: white;
        }

        .developer-tag {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
            font-family: 'Segoe UI', sans-serif;
        }

        .developer-tag b {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #FF416C;
            display: inline-block;
            margin-left: 5px;
            text-shadow: 0 0 10px rgba(255, 65, 108, 0.4);
            animation: developerGlow 2s ease-in-out infinite alternate;
        }

        @keyframes developerGlow {
            0% {
                text-shadow: 0 0 5px rgba(255, 65, 108, 0.4), 0 0 10px rgba(255, 65, 108, 0.2);
                opacity: 0.8;
            }

            50% {
                text-shadow: 0 0 20px rgba(255, 65, 108, 0.9), 0 0 35px rgba(255, 65, 108, 0.6), 0 0 50px rgba(255, 65, 108, 0.4);
                opacity: 1;
            }

            100% {
                text-shadow: 0 0 5px rgba(255, 65, 108, 0.4), 0 0 10px rgba(255, 65, 108, 0.2);
                opacity: 0.8;
            }
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
        }

        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        .fade-out {
            opacity: 1 !important;
        }

        .fade-in {
            opacity: 0 !important;
        }

        /* Floating Labels */
        .form-floating>.form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #333;
        }

        .form-floating>.form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #FF416C;
            box-shadow: 0 0 0 0.25rem rgba(255, 65, 108, 0.25);
            color: #333;
        }

        .form-floating>label {
            color: #666;
        }

        .form-floating>.form-control:focus~label,
        .form-floating>.form-control:not(:placeholder-shown)~label {
            color: #FF416C;
            transform: scale(0.85) translateY(-0.5rem) translateX(0.15rem);
        }
    </style>
</head>

<body>
    <div id="pageOverlay" class="page-transition-overlay"></div>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 style="color: #FF416C;"><i class="bi bi-arrow-left-right"></i></h1>
            <h3>MYOB Data Extractor</h3>
            <p class="text-muted">Professional Data Migration Tool</p>
        </div>

        <div id="loginForm">
            <h5 class="mb-4 text-center">Login to Your Account</h5>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
                <label for="loginEmail">Email Address</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="loginPassword" placeholder="Password">
                <label for="loginPassword">Password</label>
            </div>

            <button class="btn btn-myob mb-3" onclick="loginUser()">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>

            <a href="/signup" class="btn btn-secondary mb-3">
                <i class="bi bi-person-plus"></i> Create New Account
            </a>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/forgot-password" style="color: #FF416C; text-decoration: none;">Forgot Password?</a>
            </div>

        </div>

        <div id="alertContainer" class="mt-3"></div>
        <div class="developer-tag">
            Developed by <b>AMAN GUPTA</b>
        </div>
    </div>

    <script>

        // Page Transition Logic
        window.addEventListener('load', () => {
            const overlay = document.getElementById('pageOverlay');
            overlay.classList.add('fade-in');
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', e => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:')) {
                    e.preventDefault();
                    document.getElementById('pageOverlay').classList.remove('fade-in');
                    document.getElementById('pageOverlay').classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = href;
                    }, 500);
                }
            });
        });

        // Update login redirect to use transition
        async function loginUser() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAlert('Please enter email and password', 'warning');
                return;
            }

            const response = await fetch('/myob/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (result.success) {
                document.getElementById('pageOverlay').classList.remove('fade-in');
                document.getElementById('pageOverlay').classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 500);
            } else {
                showAlert(result.message, 'danger');
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type} alert-dismissible">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Enter key support
        document.getElementById('loginPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginUser();
        });
    </script>
</body>

</html>
